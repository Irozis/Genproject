<svg viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"><defs><filter id="img-shadow-custom:story-1080x1920" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="11.52" stdDeviation="8.64" flood-opacity="0.18"></feDropShadow></filter></defs><rect x="0" y="0" width="1080" height="1920" fill="#ffffff"></rect><image href="https://picsum.photos/1200/1200" x="129.6" y="883.2" width="820.8" height="806.4" preserveAspectRatio="xMidYMid slice"></image><text x="86.4" y="243.375" fill="#1a1a1a" font-family="&quot;Inter Display&quot;, Inter, system-ui, sans-serif" font-size="51.37500000000001" font-weight="900" opacity="1" letter-spacing="-1.0275" text-anchor="start"><tspan x="86.4" dy="0">Городская коллекция</tspan><tspan x="86.4" dy="52.40250000000001">для насыщенного ритма</tspan><tspan x="86.4" dy="52.40250000000001">работы и отдыха</tspan></text><text x="86.4" y="647.7" fill="#4E5155" font-family="Inter, system-ui, sans-serif" font-size="14.100000000000001" font-weight="400" opacity="0.72" text-anchor="start"><tspan x="86.4" dy="0">Функциональные материалы и универсальные фасоны позволяют легко адаптировать</tspan><tspan x="86.4" dy="19.035000000000004">образы под офис, встречу с друзьями и вечерние планы без лишних усилий</tspan></text><g><rect x="86.4" y="1497.6000000000001" width="345.6" height="153.6" rx="76.8" ry="76.8" fill="#ffffff"></rect><text x="259.20000000000005" y="1574.4" fill="#0E1014" font-family="&quot;Inter Display&quot;, Inter, system-ui, sans-serif" font-size="25.92" font-weight="700" text-anchor="middle" dominant-baseline="central" letter-spacing="0.5184000000000001">Посмотреть подборку</text></g></svg>