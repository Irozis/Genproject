<svg viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"><defs><filter id="img-shadow-custom:story-1080x1920" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="11.52" stdDeviation="8.64" flood-opacity="0.18"></feDropShadow></filter></defs><rect x="0" y="0" width="1080" height="1920" fill="#ffffff"></rect><image href="https://picsum.photos/1200/1200" x="129.6" y="883.2" width="820.8" height="806.4" preserveAspectRatio="xMidYMid slice"></image><text x="86.4" y="213.0234375" fill="#1a1a1a" font-family="&quot;Inter Display&quot;, Inter, system-ui, sans-serif" font-size="21.0234375" font-weight="900" opacity="1" letter-spacing="-0.42046875" text-anchor="start"><tspan x="86.4" dy="0">Комфортная обувная линия с мягкой поддержкой и</tspan><tspan x="86.4" dy="21.44390625">устойчивостью на весь день Комфортная обувная линия</tspan><tspan x="86.4" dy="21.44390625">с мягкой поддержкой и устойчивостью на весь день</tspan></text><text x="86.4" y="645.6" fill="#4E5155" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" opacity="0.72" text-anchor="start"><tspan x="86.4" dy="0">Каждая модель разработана так, чтобы снизить нагрузку на стопу, обеспечить устойчивость</tspan><tspan x="86.4" dy="16.200000000000003">при ходьбе и сохранить аккуратный внешний вид в течение дня, даже если вы много перемещае…</tspan></text><g><rect x="86.4" y="1497.6000000000001" width="345.6" height="153.6" rx="76.8" ry="76.8" fill="#ffffff"></rect><text x="259.20000000000005" y="1574.4" fill="#0E1014" font-family="&quot;Inter Display&quot;, Inter, system-ui, sans-serif" font-size="22.875" font-weight="700" text-anchor="middle" dominant-baseline="central" letter-spacing="0.4575">Подобрать пару Подобрать пару</text></g></svg>